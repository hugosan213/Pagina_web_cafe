<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería - Café</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/galeria.css">
</head>
<body style="background-color: #FFE6A7; margin: 0; padding: 0;"> 

    <main>
        <h1 style="text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 600; margin-top: 40px; color: #6F1D1B; font-size: 2.5rem;">
            Nuestra Galería
        </h1>
        
        <p style="text-align: center; font-family: 'Montserrat', sans-serif; color: #432818; max-width: 700px; margin: 0 auto 40px; opacity: 0.9;">
            Disfrutá de la calidez de nuestro café en Esquel.
        </p>

        <div class="slider-container">
            <div class="slider-wrapper">
                
                <div class="slide">
                    <img src="../img/Comida-Saludable.jpg">
                    <div class="caption">Ambiente Cálido</div>
                </div>

                <div class="slide">
                    <img src="../img/torta-roja.jpg">
                    <div class="caption">Especialidad</div>
                </div>

                <div class="slide">
                    <img src="../img/huevo.jpg">
                    <div class="caption">Recién horneado</div>
                </div>

                <div class="slide">
                    <img src="../img/comida-tomate.jpg">
                    <div class="caption">Opciones Deliciosas</div>
                </div>

                <div class="slide">
                    <img src="../img/panqueque2.jpg">
                    <div class="caption">Grano Premium</div>
                </div>

                <div class="slide">
                    <img src="../img/tequenio.jpg">
                    <div class="caption">Pastelería del día</div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
